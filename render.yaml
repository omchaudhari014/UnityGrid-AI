services:
  # ── Backend: FastAPI ─────────────────────────────────────────────────────────
  - type: web
    name: unitygrid-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health

  # ── Frontend: Vite Static Site ────────────────────────────────────────────────
  - type: web
    name: unitygrid-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # you will paste this in the Render dashboard after backend deploys
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
